name: Daily X Digest (Agent-Reach path)

# 北京时间 08:00 = UTC 00:00
# 管线: twitter-cli Cookie 读 X → DeepSeek 总结 → digests + Pages 文件
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pyyaml
          pip install twitter-cli || pip install "twitter-cli>=0.1" || true
          # ensure twitter on PATH if installed as module
          python -c "import shutil; print('twitter', shutil.which('twitter'))"

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          ALL_PROXY: ${{ secrets.ALL_PROXY }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "Missing DEEPSEEK_API_KEY secret"
            exit 1
          fi
          if [ -z "$TWITTER_AUTH_TOKEN" ] || [ -z "$TWITTER_CT0" ]; then
            echo "Missing TWITTER_AUTH_TOKEN and/or TWITTER_CT0 (X cookie). See docs/SETUP_X_DEEPSEEK_PAGES.md"
            exit 1
          fi
          python scripts/run_x_digest.py

      - name: Commit digests and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests/ x_raw/ docs/*.html docs/style.css || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(digest): daily X digest $(date -u +%Y-%m-%d)"
            git push
          fi

  # Optional: deploy docs/ HTML as Pages if repo uses GitHub Actions Pages source
  # User can also set Pages to "Deploy from branch" → /docs
